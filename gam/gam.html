<!DOCTYPE html>
<html>
<head>
  <title>Grown Ahh Men</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 50px;
    }

    #box {
      height: 400px;
      overflow-y: auto;
      border: 1px solid white;
      padding: 10px;
      margin-top: 20px;
    }

    .line {
      font-size: 24px;
      font-weight: bold;
      margin: 5px;
    }

    button {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>GROWN AHH MEN</h1>

  <button onclick="addLine()">Grown Ahh Men</button>

  <div id="box"></div>

  <script>
    function addLine() {
      const box = document.getElementById("box");

      const div = document.createElement("div");
      div.className = "line";
      div.innerText = "GROWN AHH MEN SAYING GROWN AHH MEN";

      box.appendChild(div);
    }
  </script>

</body>
</html>
