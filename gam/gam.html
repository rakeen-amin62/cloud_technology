<!DOCTYPE html>
<html>
<head>
  <title>Grown Ahh Men</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 50px;
    }

    #counter {
      font-size: 25px;
      margin: 10px;
      color: yellow;
    }

    #box {
      height: 400px;
      overflow-y: auto;
      border: 2px solid white;
      padding: 10px;
      margin-top: 20px;
    }

    .line {
      font-size: 24px;
      font-weight: bold;
      margin: 5px;
    }

    button {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>GROWN AHH MEN</h1>

  <div id="counter">Clicks: 0</div>

  <button onclick="addLine()">Grown Ahh Men</button>

  <div id="box"></div>

  <script>
    let count = 0;

    function getRandomColor() {
      const colors = [
        "red", "orange", "yellow", "lime", "cyan",
        "blue", "purple", "pink", "white", "gold"
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function addLine() {
      count++;

      // update counter
      document.getElementById("counter").innerText = "Clicks: " + count;

      // create new line
      const box = document.getElementById("box");
      const div = document.createElement("div");

      div.className = "line";
      div.innerText = "GROWN AHH MEN SAYING GROWN AHH MEN";

      // random color
      div.style.color = getRandomColor();

      box.appendChild(div);

      // auto scroll down
      box.scrollTop = box.scrollHeight;
    }
  </script>

</body>
</html>
